# fly.toml app configuration file generated for stockreport-bot on 2026-05-10T23:41:41+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'stockreport-bot'
primary_region = 'nrt'

[build]

[env]
  PDF_SAVE_DIR = './pdfs'

[processes]
  app = 'python bot.py'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
